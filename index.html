<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Zayvora MVP - mobile base-building strategy loop"
    />
    <title>Zayvora MVP</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Zayvora playable MVP">
      <section class="top-bar" aria-label="Resource HUD">
        <div class="hud-card">
          💰 Aether: <span id="aether-balance">0</span>
        </div>
        <div class="hud-card">Fleet: <span id="fleet-count">🛩️ 0</span></div>
      </section>

      <section class="command-panel" aria-label="Base commands">
        <button id="build-refinery-btn" class="btn primary" type="button">
          Build Refinery (50 Aether)
        </button>
        <button id="train-airship-btn" class="btn" type="button">
          Train Airship (100 Aether)
        </button>
        <button id="raid-clouds-btn" class="btn danger" type="button">
          Raid Clouds ☁️
        </button>
      </section>

      <section class="status-panel" aria-live="polite">
        <p id="production-queue">Production queue: idle</p>
        <p id="combat-log">
          Generate Aether, build 🏭, train 🛩️, then raid the ☁️.
        </p>
      </section>

      <section class="grid-shell" aria-label="Base grid">
        <div
          id="base-grid"
          class="base-grid"
          role="grid"
          aria-label="10 by 10 base build grid"
        ></div>
      </section>

      <section class="debug-panel" aria-label="Debug controls">
        <button id="wipe-save-btn" class="btn ghost" type="button">
          Wipe Save
        </button>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
