<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="SkillHex Runner - a vanilla JS web game" />
    <title>SkillHex Runner</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="start-screen" class="overlay visible" aria-live="polite">
        <div class="panel">
          <h1>SkillHex Runner</h1>
          <p>Avoid hazards, survive as long as possible, and build your logic score.</p>
          <button id="start-btn" class="btn primary">Start Game</button>
        </div>
      </section>

      <section class="hud" aria-label="Game HUD">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">Best: <span id="best-score">0</span></div>
        <div class="hud-actions">
          <button id="pause-btn" class="btn">Pause</button>
          <button id="restart-btn" class="btn">Restart</button>
        </div>
      </section>

      <section class="canvas-wrap">
        <canvas id="game-canvas" width="800" height="500" aria-label="Game canvas"></canvas>
      </section>

      <section id="end-screen" class="overlay" aria-live="polite">
        <div class="panel">
          <h2>Game Over</h2>
          <p>Your score: <span id="final-score">0</span></p>
          <button id="play-again-btn" class="btn primary">Play Again</button>
        </div>
      </section>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
